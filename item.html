<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Item — Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <header class="header">
      <a href="index.html" class="header__logo">
        <img src="images/ui/logo.png" alt="Logo">
      </a>
      <nav class="header__nav">
        <a href="index.html#ceramics">ceramics</a>
        <a href="index.html#dolls">dolls</a>
        <a href="index.html#about">about</a>
        <a href="index.html#contact">contact</a>
      </nav>
      <button class="header__burger" aria-label="Menu">
        <img src="images/ui/burger-1.png" alt="">
        <img src="images/ui/burger-2.png" alt="">
        <img src="images/ui/burger-3.png" alt="">
      </button>
    </header>

    <main class="main">
      <section class="item-page">
        <div class="container">
          <a href="javascript:void(0)" onclick="history.back()" class="item-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
          </a>

          <div class="item-layout">
            <div class="item-gallery">
              <div id="item-main-image" class="item-gallery__main">
                <div class="placeholder-img">Loading...</div>
              </div>
              <div id="item-thumbs" class="item-gallery__thumbs"></div>
            </div>

            <div class="item-info">
              <h1 id="item-title" class="item-info__title"></h1>
              <p id="item-description" class="item-info__description"></p>
              <dl id="item-details" class="item-details"></dl>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; 2025 Artist. All rights reserved.</p>
      </div>
    </footer>

    <script type="module" src="js/item-page.js"></script>
  </body>
</html>
